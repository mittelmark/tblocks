<?xml version="1.0" encoding="ISO-8859-1"?>
 <svg width="1200" height="527.5" xmlns="http://www.w3.org/2000/svg">
  <style>
  @import url(https://fonts.bunny.net/css?family=andika:400,400i,700,700i|ubuntu-mono:400,400i,700,700i);
  .header {
      font-family: 'Andika', sans-serif;
      font-size: 28px;
      fill: #000000;
  }
  .normal {
      font-family: 'Andika', sans-serif;
      font-size: 22px;
      fill: #333366;
  }
  .small {
      font-family: 'Andika', sans-serif;
      font-size: 16px;
      fill: #333366;
  }
  .large {
      font-family: 'Andika', sans-serif;
      font-size: 24px;
      fill: #333366;
  }
  .mono {
      font-family: 'Ubuntu Mono', monospaced;
      font-size: 22px;
      fill: #333366;
  }
  .bold {
      font-family: 'Andika', sans-serif;
      font-weight: bold;
      font-size: 22px;
      fill: #333366;
  }
  
  </style>
<rect  x="20" y="20" width="360" height="507.5" rx="0" ry="0"  stroke-width="2" stroke="#888888" fill="#F6F6F6"/>
<rect  x="20" y="20" width="360" height="30" rx="0" ry="0"  stroke-width="2" stroke="#888888" fill="#E68080"/>
<text x="200.0" y="90" class="header" text-anchor="middle">Bonferroni</text>
<text x="200.0" y="150" class="normal" text-anchor="middle">High Strictness</text>
<text x="200.0" y="210" class="normal" text-anchor="middle">Multiplies p-values by the</text>
<text x="200.0" y="240" class="normal" text-anchor="middle">number of tests.</text>
<text x="200.0" y="270" class="normal" text-anchor="middle">Highly conservative.</text>
<text x="200.0" y="330" class="normal" text-anchor="middle">Verdict: Prevents false</text>
<text x="200.0" y="360" class="normal" text-anchor="middle">positives but washes out real,</text>
<text x="200.0" y="390" class="normal" text-anchor="middle">small effects.</text>
<text x="200.0" y="420" class="normal" text-anchor="middle">Many false negatives..</text>
<text x="200.0" y="480" class="normal" text-anchor="middle">R: </text>
<text x="200.0" y="510" class="normal" text-anchor="middle">p.adjust(x,method="bonferroni")</text>
<rect  x="420" y="20" width="360" height="507.5" rx="0" ry="0"  stroke-width="2" stroke="#888888" fill="#F6F6F6"/>
<rect  x="420" y="20" width="360" height="30" rx="0" ry="0"  stroke-width="2" stroke="#888888" fill="#80CC80"/>
<text x="600.0" y="90" class="header" text-anchor="middle">Holm Step-Down</text>
<text x="600.0" y="150" class="normal" text-anchor="middle">Medium Strictness</text>
<text x="600.0" y="210" class="normal" text-anchor="middle">Ranks p-values and applies</text>
<text x="600.0" y="240" class="normal" text-anchor="middle">a decreasing multiplier</text>
<text x="600.0" y="270" class="normal" text-anchor="middle">(n, n-1, n-2).</text>
<text x="600.0" y="330" class="normal" text-anchor="middle">Verdict: A smarter, staged</text>
<text x="600.0" y="360" class="normal" text-anchor="middle">alternative to Bonferroni.</text>
<text x="600.0" y="480" class="normal" text-anchor="middle">R: </text>
<text x="600.0" y="510" class="normal" text-anchor="middle">p.adjust(x,method="holm")</text>
<rect  x="820" y="20" width="360" height="507.5" rx="0" ry="0"  stroke-width="2" stroke="#888888" fill="#F6F6F6"/>
<rect  x="820" y="20" width="360" height="30" rx="0" ry="0"  stroke-width="2" stroke="#888888" fill="#E6B380"/>
<text x="1000.0" y="90" class="header" text-anchor="middle">Benjamini-Hochberg (FDR)</text>
<text x="1000.0" y="150" class="normal" text-anchor="middle">Balanced Strictness</text>
<text x="1000.0" y="210" class="normal" text-anchor="middle">Controls the False Discovery</text>
<text x="1000.0" y="240" class="normal" text-anchor="middle">Rate by ranking values from</text>
<text x="1000.0" y="270" class="normal" text-anchor="middle">largest to smallest.</text>
<text x="1000.0" y="330" class="normal" text-anchor="middle">Verdict: The modern standard</text>
<text x="1000.0" y="360" class="normal" text-anchor="middle">for high-volume testing.</text>
<text x="1000.0" y="390" class="normal" text-anchor="middle">Balances discovery with </text>
<text x="1000.0" y="420" class="normal" text-anchor="middle">caution.</text>
<text x="1000.0" y="480" class="normal" text-anchor="middle">R: </text>
<text x="1000.0" y="510" class="normal" text-anchor="middle">p.adjust(x,method="BH")</text>
</svg>
