<text x="10" y="165" class="large" text-anchor="left">Memory</text>
<text x="10" y="275" class="large" text-anchor="left">Safety</text>
<text x="10" y="385" class="large" text-anchor="left">API </text>
<text x="10" y="495" class="large" text-anchor="left">Speed</text>
